<svg width="400" height="400" viewBox="152 20 376 382" xmlns="http://www.w3.org/2000/svg">
<title>Game On CTF logo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&amp;family=Share+Tech+Mono&amp;display=swap');
  .orb { font-family: 'Orbitron', monospace; }
  .mono { font-family: 'Share Tech Mono', monospace; }
</style>
<defs>
  <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#020617"/>
    <stop offset="100%" stop-color="#0f172a"/>
  </linearGradient>
  <linearGradient id="hexGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0e1a2e"/>
    <stop offset="100%" stop-color="#060e1a"/>
  </linearGradient>
  <linearGradient id="cyanGold" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#22d3ee"/>
    <stop offset="55%" stop-color="#38bdf8"/>
    <stop offset="100%" stop-color="#f59e0b"/>
  </linearGradient>
  <filter id="glow">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<rect width="680" height="420" fill="url(#bgGrad)"/>

<g opacity="0.04" stroke="#22d3ee" stroke-width="0.5">
  <line x1="0" y1="70" x2="680" y2="70"/>
  <line x1="0" y1="140" x2="680" y2="140"/>
  <line x1="0" y1="210" x2="680" y2="210"/>
  <line x1="0" y1="280" x2="680" y2="280"/>
  <line x1="0" y1="350" x2="680" y2="350"/>
  <line x1="113" y1="0" x2="113" y2="420"/>
  <line x1="226" y1="0" x2="226" y2="420"/>
  <line x1="340" y1="0" x2="340" y2="420"/>
  <line x1="453" y1="0" x2="453" y2="420"/>
  <line x1="566" y1="0" x2="566" y2="420"/>
</g>

<polygon points="340,36 508,130 508,298 340,384 172,298 172,130"
  fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.25"/>
<polygon points="340,44 500,136 500,290 340,376 180,290 180,136"
  fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.5"/>
<polygon points="340,48 492,136 492,284 340,372 188,284 188,136"
  fill="url(#hexGrad)" stroke="#1e3a5f" stroke-width="1"/>

<g stroke="#22d3ee" stroke-width="0.8" opacity="0.35" fill="none">
  <polyline points="260,80 260,108 220,108 220,136"/>
  <polyline points="420,80 420,108 460,108 460,136"/>
  <polyline points="200,180 230,180 230,210 210,210"/>
  <polyline points="200,240 240,240 240,268"/>
  <polyline points="480,180 450,180 450,210 470,210"/>
  <polyline points="480,240 440,240 440,268"/>
  <polyline points="280,335 280,310 250,310"/>
  <polyline points="400,335 400,310 430,310"/>
</g>
<g fill="#22d3ee" opacity="0.5">
  <circle cx="260" cy="108" r="2.5"/>
  <circle cx="220" cy="108" r="2.5"/>
  <circle cx="420" cy="108" r="2.5"/>
  <circle cx="460" cy="108" r="2.5"/>
  <circle cx="230" cy="180" r="2.5"/>
  <circle cx="230" cy="210" r="2.5"/>
  <circle cx="240" cy="240" r="2.5"/>
  <circle cx="450" cy="180" r="2.5"/>
  <circle cx="450" cy="210" r="2.5"/>
  <circle cx="440" cy="240" r="2.5"/>
  <circle cx="280" cy="310" r="2.5"/>
  <circle cx="430" cy="310" r="2.5"/>
</g>

<polygon points="340,92 440,148 440,262 340,318 240,262 240,148"
  fill="none" stroke="#1e3a5f" stroke-width="1" opacity="0.8"/>
<ellipse cx="340" cy="210" rx="80" ry="60" fill="#f59e0b" opacity="0.04"/>

<g transform="translate(312, 148)">
  <line x1="0" y1="0" x2="0" y2="44" stroke="#22d3ee" stroke-width="2" opacity="0.9"/>
  <polygon points="0,0 28,8 0,18" fill="#f59e0b" opacity="0.9"/>
</g>

<text x="340" y="222" text-anchor="middle"
  class="orb" font-size="52" font-weight="900" letter-spacing="6"
  fill="url(#cyanGold)" filter="url(#glow)">GAME</text>
<text x="340" y="270" text-anchor="middle"
  class="orb" font-size="42" font-weight="900" letter-spacing="10"
  fill="#f59e0b" opacity="0.95" filter="url(#glow)">ON</text>

<line x1="248" y1="284" x2="432" y2="284" stroke="url(#cyanGold)" stroke-width="1" opacity="0.6"/>
<text x="340" y="308" text-anchor="middle"
  class="mono" font-size="12" letter-spacing="4"
  fill="#94a3b8" opacity="0.85">CTF CHALLENGE</text>
</svg>
